<div class="auth-page">
  <!-- Animated background orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="auth-card">
    <!-- Logo / Header -->
    <div class="auth-header">
      <div class="logo-icon">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="10" fill="url(#lg1)"/>
          <path d="M10 26L18 10L26 26" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13 21h10" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <defs>
            <linearGradient id="lg1" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
              <stop stop-color="#6C63FF"/>
              <stop offset="1" stop-color="#4ECDC4"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="brand-name">QuantiMeasure</h1>
      <p class="brand-tagline">Precision unit conversions, powered by science</p>
    </div>

    <!-- Tab Toggle -->
    <div class="tab-bar">
      <button class="tab-btn" [class.active]="mode === 'login'" (click)="mode === 'signup' && toggleMode()" id="tab-login">
        Sign In
      </button>
      <button class="tab-btn" [class.active]="mode === 'signup'" (click)="mode === 'login' && toggleMode()" id="tab-signup">
        Sign Up
      </button>
    </div>

    <!-- Form -->
    <form class="auth-form" (ngSubmit)="submit()" #authForm="ngForm">
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          <input id="username" type="text" placeholder="Enter your username" [(ngModel)]="username" name="username" autocomplete="username" />
        </div>
      </div>

      @if (mode === 'signup') {
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
            </svg>
            <input id="email" type="email" placeholder="Enter your email" [(ngModel)]="email" name="email" autocomplete="email" />
          </div>
        </div>
      }

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input id="password" type="password" placeholder="Enter your password" [(ngModel)]="password" name="password" autocomplete="current-password" />
        </div>
      </div>

      @if (mode === 'signup') {
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 12l2 2 4-4m6 2a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
            </svg>
            <input id="confirmPassword" type="password" placeholder="Confirm your password" [(ngModel)]="confirmPassword" name="confirmPassword" autocomplete="new-password" />
          </div>
        </div>
      }

      @if (errorMsg()) {
        <div class="alert alert-error">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ errorMsg() }}
        </div>
      }

      @if (successMsg()) {
        <div class="alert alert-success">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 12l2 2 4-4m6 2a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
          </svg>
          {{ successMsg() }}
        </div>
      }

      <button id="auth-submit-btn" type="submit" class="btn-primary" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span> {{ mode === 'login' ? 'Signing in...' : 'Creating account...' }}
        } @else {
          {{ mode === 'login' ? 'Sign In' : 'Create Account' }}
        }
      </button>
    </form>

    <p class="auth-footer-text">
      {{ mode === 'login' ? "Don't have an account?" : 'Already have an account?' }}
      <button class="link-btn" (click)="toggleMode()">{{ mode === 'login' ? 'Sign up' : 'Sign in' }}</button>
    </p>
  </div>
</div>
